<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ask Portal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <video autoplay muted loop playsinline id="bgVideo">
        <source src="video_draft-7.mp4" type="video/mp4">
        Your browser does not support HTML5 video.
    </video>

    <div id="main-contents">
        <div id="answer-container"></div>
        <div class="chat-container">
            <div id="promptInput" role="textbox" aria-label="Write your entry here" contenteditable="true" spellcheck="false" placeholder="search for an answer..."
                tabindex="1"></div>
    
            <div class="controls">
                <button id="clearBtn" aria-label="Clear all entries" tabindex="3">forget</button>
                <button id="askBtn" aria-label="Create a new entry" tabindex="2">ask</button>
            </div>
        </div>
    </div>

    <div class="statement">
        <p><a href="javascript:void(0)" id="infoLink">what is this?</a></p>
    </div>

    <div id="infoModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h2>Ask Portal</h2>
                <button id="closeModal" class="close-button">×</button>
            </div>
            <div class="modal-content">
                <p><i>Ask Portal</i> is a machine of inconvenience. It borrows its form matter from familiar generative AI tools, from the rounded corners of its prompt input to the vast minimalism of its interface. It refuses all that generative AI offers.</p>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('promptInput');
        const askBtn = document.getElementById('askBtn');
        const clearBtn = document.getElementById('clearBtn');
        const video = document.getElementById('bgVideo');
        const answerBox = document.getElementById('answer-container');

        let hasAnswered = false;
        const answer = "\"ask\":\ncall on for an answer\n\nspeak, utter\nset as a price\ninvite\n\nperform a ritual\n\nas a tech demo";

        const updateButtonVisibility = () => {
            const chips = input.querySelectorAll('.chip');
            clearBtn.style.display = chips.length > 0 ? 'inline-block' : 'none';
        };

        window.onload = () => {
            // const savedContent = localStorage.getItem('userPrompt');
            // if (savedContent) {
            //     input.innerHTML = savedContent;
            // }
            updateButtonVisibility();
            input.focus();
        };

        input.addEventListener('input', () => {
            localStorage.setItem('userPrompt', input.innerHTML);
            updateButtonVisibility();
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                askBtn.click();
            }
        });

        input.addEventListener('keyup', (e) => {
            if (e.key === 'Backspace' || e.key === 'Delete') {
                updateButtonVisibility();
            }
        });

        askBtn.addEventListener('click', () => {
            let newText = "";
            const nodesToRemove = [];

            input.childNodes.forEach(node => {
                if (node.nodeType === Node.TEXT_NODE) {
                    newText += node.textContent;
                    nodesToRemove.push(node);
                }
            });

            const trimmedText = newText.trim();

            if (trimmedText) {
                nodesToRemove.forEach(node => node.remove());

                const chip = document.createElement('span');
                chip.className = 'chip';
                chip.contentEditable = "false";
                chip.innerText = trimmedText;

                input.appendChild(chip);
                input.appendChild(document.createElement('br'));
                input.appendChild(document.createElement('br'));

                const chipCount = input.querySelectorAll('.chip').length;
                
                if (chipCount >= 5 && !hasAnswered) {
                    hasAnswered = true;
                    streamTextWithCaret(answer);
                }

                localStorage.setItem('userPrompt', input.innerHTML);
                updateButtonVisibility();
                placeCaretAtEnd(input);
            }
        });

        clearBtn.addEventListener('click', () => {
            localStorage.removeItem('userPrompt');
            answerBox.innerHTML = '';
            hasAnswered = false;
            input.innerHTML = '';
            updateButtonVisibility();
            input.focus();
        });

        function streamTextWithCaret(text) {
            answerBox.innerHTML = '';
            
            const textSpan = document.createElement('span');
            const caretSpan = document.createElement('span');
            caretSpan.className = 'caret blink'; 
            
            answerBox.appendChild(textSpan);
            answerBox.appendChild(caretSpan);

            let i = 0;
            
            function type() {
                if (i < text.length) {
                    const speed = Math.floor(Math.random() * (300 - 30 + 1)) + 30;
                    textSpan.textContent += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                }
            }
            
            setTimeout(type, 200); 
        }

        function placeCaretAtEnd(el) {
            el.focus();
            const range = document.createRange();
            range.selectNodeContents(el);
            range.collapse(false);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
        }

        const modal = document.getElementById('infoModal');
        const infoLink = document.getElementById('infoLink');
        const closeModal = document.getElementById('closeModal');

        infoLink.addEventListener('click', (e) => {
            e.preventDefault();
            modal.classList.add('modal-open');
        });

        closeModal.addEventListener('click', () => {
            modal.classList.remove('modal-open');
        });

        window.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('modal-open');
            }
        });

        window.addEventListener('load', () => {
            const video = document.getElementById('bgVideo');
            video.play().catch(error => {
                console.log("Autoplay was prevented by the browser.");
            });
        });
        
    </script>

</body>
</html>
