<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask Portal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <video autoplay muted loop playsinline id="bgVideo">
        <source src="video_draft-7.mp4" type="video/mp4">
        Your browser does not support HTML5 video.
    </video>

    <div id="main-contents">
        <div id="answer-container"></div>
        <div class="chat-container">
            <div id="promptInput" role="textbox" aria-label="Write your entry here" contenteditable="true" spellcheck="false" placeholder="SEARCH FOR AN ANSWER..."
                tabindex="1"></div>
    
            <div class="controls">
                <button id="clearBtn" aria-label="Clear all entries" tabindex="3">FORGET</button>
                <button id="askBtn" aria-label="Create a new entry" tabindex="2">ASK</button>
            </div>
        </div>
    
    </div>

    <div class="statement">
        <p><a href="#" target="_blank">what is this?</a></p>
    </div>

    <script>
        const input = document.getElementById('promptInput');
        const askBtn = document.getElementById('askBtn');
        const clearBtn = document.getElementById('clearBtn');
        const video = document.getElementById('bgVideo');
        const answerBox = document.getElementById('answer-container');

        let hasAnswered = false;

        const answer = "When ‘searching for an answer’ with AI becomes a ritual, asking is all you can do. Asking is the human act.";

        const updateButtonVisibility = () => {
            const chips = input.querySelectorAll('.chip');
            clearBtn.style.display = chips.length > 0 ? 'inline-block' : 'none';
        };

        window.onload = () => {
            const savedContent = localStorage.getItem('userPrompt');
            if (savedContent) {
                input.innerHTML = savedContent;
            }
            updateButtonVisibility();
        };

        input.addEventListener('input', () => {
            localStorage.setItem('userPrompt', input.innerHTML);
            updateButtonVisibility();
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                askBtn.click();
            }
        });

        input.addEventListener('keyup', (e) => {
            if (e.key === 'Backspace' || e.key === 'Delete') {
                updateButtonVisibility();
            }
        });

        askBtn.addEventListener('click', () => {
            let newText = "";
            const nodesToRemove = [];

            input.childNodes.forEach(node => {
                if (node.nodeType === Node.TEXT_NODE) {
                    newText += node.textContent;
                    nodesToRemove.push(node);
                }
            });

            const trimmedText = newText.trim();

            if (trimmedText) {
                nodesToRemove.forEach(node => node.remove());

                const chip = document.createElement('span');
                chip.className = 'chip';
                chip.contentEditable = "false";
                chip.innerText = trimmedText;

                input.appendChild(chip);

                input.appendChild(document.createElement('br'));
                input.appendChild(document.createElement('br'));

                const chipCount = input.querySelectorAll('.chip').length;
                if (chipCount >= 5 && !hasAnswered) {
                    hasAnswered = true;
                    streamText(answer);
                }

                localStorage.setItem('userPrompt', input.innerHTML);
                updateButtonVisibility();
                placeCaretAtEnd(input);
            }
        });

        clearBtn.addEventListener('click', () => {
            localStorage.removeItem('userPrompt');

            answerBox.innerHTML = '';

            input.innerHTML = '';
            updateButtonVisibility();
            input.focus();
        });

        function streamText(text) {
            let i = 0;
            const speed = Math.floor(Math.random() * (140 - 30 + 1)) + 30; // Random ms value between 100 and 30
            
            function type() {
                if (i < text.length) {
                    answerBox.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        }

        function placeCaretAtEnd(el) {
            el.focus();
            const range = document.createRange();
            range.selectNodeContents(el);
            range.collapse(false);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
        }
    </script>

</body>

</html>
